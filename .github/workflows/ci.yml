name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node (for mermaid-cli)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install mermaid-cli
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Restore
        run: dotnet restore Readmd.slnx

      - name: Build
        run: dotnet build Readmd.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/Readmd.Tests/Readmd.Tests.csproj --configuration Release --no-build --verbosity normal

  pack:
    name: Pack tool
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pack
        run: dotnet pack src/Readmd.Cli/Readmd.Cli.csproj --configuration Release -o artifacts/nupkg

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: readmd-nupkg
          path: artifacts/nupkg/*.nupkg
