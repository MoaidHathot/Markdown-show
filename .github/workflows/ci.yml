name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node (for mermaid-cli)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install mermaid-cli
        run: npm install -g @mermaid-js/mermaid-cli

      # mermaid-cli (Puppeteer) needs a Chrome headless-shell binary; the global npm install doesn't
      # fetch one. Install it with mermaid-cli's OWN bundled Puppeteer into Puppeteer's default cache
      # (~/.cache/puppeteer), which the same bundled Puppeteer reads at runtime - so the browser
      # buildId and location match exactly what mmdc uses (a separate `npx puppeteer` can resolve a
      # different build/cache). This makes the mermaid regression tests run on CI; if anything still
      # goes wrong they skip (see DiagramRenderingRegressionTests) rather than failing the build.
      - name: Install Puppeteer browser for mermaid-cli
        shell: bash
        run: |
          MMDC_DIR="$(npm root -g)/@mermaid-js/mermaid-cli"
          node "$MMDC_DIR/node_modules/puppeteer/lib/cjs/puppeteer/node/cli.js" \
            browsers install chrome-headless-shell

      # GitHub's Ubuntu runners (23.10+) restrict unprivileged user namespaces via AppArmor, which
      # makes Chromium's sandbox abort with "No usable sandbox!" - so mmdc can't launch its browser.
      # Relax that restriction on the runner (a throwaway CI VM) so the mermaid tests can actually
      # render, instead of weakening the sandbox in the product itself.
      - name: Allow Chromium sandbox on Ubuntu runner
        if: runner.os == 'Linux'
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Restore
        run: dotnet restore Readmd.slnx

      - name: Build
        run: dotnet build Readmd.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/Readmd.Tests/Readmd.Tests.csproj --configuration Release --no-build --verbosity normal

  pack:
    name: Pack tool
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pack
        run: dotnet pack src/Readmd.Cli/Readmd.Cli.csproj --configuration Release -o artifacts/nupkg

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: readmd-nupkg
          path: artifacts/nupkg/*.nupkg
